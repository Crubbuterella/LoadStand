spring:
  application:
    name: kafka-client-processor

  # PostgreSQL: 161.104.32.243:5432, база load_db
  datasource:
    url: jdbc:postgresql://161.104.32.243:5432/load_db?connectTimeout=10&socketTimeout=30
    username: load
    password: PASSWORD
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Kafka: 161.104.32.243:9092
  kafka:
    bootstrap-servers: 161.104.32.243:9092
    consumer:
      group-id: client-processor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  kafka:
    input-topic: topic1
    output-topic: message-out

# HTTP-порт для Actuator (REST API приложения нет, только метрики)
server:
  port: 8081

# Actuator + экспорт метрик JVM/Kafka/БД в формате Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: kafka-client-processor
    enable:
      jvm: true
      process: true
      system: true
      logback: true
      hikaricp: true
      jdbc: true
      kafka: true
  prometheus:
    metrics:
      export:
        enabled: true
