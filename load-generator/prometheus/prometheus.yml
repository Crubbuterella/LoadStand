global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'load-generator'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'load-target'
    static_configs:
      - targets: ['161.104.32.243:9100']
